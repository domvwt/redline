<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family='-apple-system, "Segoe UI", Roboto, Arial, sans-serif'>
  <defs>
    <clipPath id="win">
      <rect x="40" y="20" width="880" height="480" rx="12"/>
    </clipPath>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="112%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#23211d" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- app window -->
  <rect x="40" y="20" width="880" height="480" rx="12" fill="#fbfaf8" stroke="#e2ded6" filter="url(#shadow)"/>

  <g clip-path="url(#win)">
    <!-- document pane -->
    <rect x="40" y="79" width="580" height="421" fill="#fffefb"/>
    <!-- sidebar pane -->
    <rect x="620" y="79" width="300" height="421" fill="#f3f1ec"/>
    <line x1="620" y1="79" x2="620" y2="500" stroke="#e2ded6"/>
  </g>

  <!-- header -->
  <line x1="40" y1="79" x2="920" y2="79" stroke="#e2ded6"/>
  <rect x="62" y="42" width="12" height="12" fill="#b03d22" transform="rotate(45 68 48)"/>
  <text x="84" y="55" font-family='Charter, Georgia, serif' font-size="20" font-weight="600" fill="#23211d">redline</text>
  <text x="200" y="54" font-size="12.5" fill="#837d72">guides / getting-started.md</text>
  <rect x="798" y="36" width="100" height="26" rx="13" fill="none" stroke="#b03d22"/>
  <text x="848" y="53" font-size="12" fill="#b03d22" text-anchor="middle">1 to review</text>

  <!-- document content -->
  <text x="90" y="134" font-family='Charter, Georgia, serif' font-size="26" font-weight="700" fill="#23211d">Getting started</text>
  <g fill="#e2ded6">
    <rect x="90" y="158" width="460" height="10" rx="5"/>
    <rect x="90" y="180" width="426" height="10" rx="5"/>
    <rect x="90" y="202" width="310" height="10" rx="5"/>
  </g>

  <!-- highlighted sentence -->
  <rect x="300" y="232" width="212" height="24" rx="3" fill="#f9e9b8"/>
  <rect x="300" y="254" width="212" height="2" fill="#d9b458"/>
  <g font-family='Charter, Georgia, serif' font-size="16" fill="#37342e">
    <text x="90" y="249" textLength="204" lengthAdjust="spacingAndGlyphs">Point redline at a folder and</text>
    <text x="304" y="249" textLength="204" lengthAdjust="spacingAndGlyphs">leave comments in the margin</text>
    <text x="522" y="249">—</text>
    <text x="90" y="277">your agent addresses each one right in your files.</text>
  </g>

  <!-- code block -->
  <rect x="90" y="300" width="330" height="46" rx="8" fill="#f3f1ec" stroke="#e2ded6"/>
  <text x="108" y="328" font-family='ui-monospace, "SF Mono", Menlo, Consolas, monospace' font-size="14" fill="#23211d">redline docs/</text>

  <g fill="#e2ded6">
    <rect x="90" y="372" width="440" height="10" rx="5"/>
    <rect x="90" y="394" width="386" height="10" rx="5"/>
    <rect x="90" y="416" width="300" height="10" rx="5"/>
    <rect x="90" y="452" width="420" height="10" rx="5"/>
    <rect x="90" y="474" width="248" height="10" rx="5"/>
  </g>

  <!-- leader from highlight to comment card -->
  <path d="M 514 244 C 570 244, 586 176, 630 172" fill="none" stroke="#d9b458" stroke-width="1.5" stroke-dasharray="3 4"/>

  <!-- sidebar -->
  <text x="644" y="106" font-size="10.5" letter-spacing="1.4" fill="#837d72">COMMENTS</text>

  <!-- comment card (addressed, awaiting review) -->
  <rect x="636" y="120" width="268" height="220" rx="10" fill="#fffefb" stroke="#cfdfd4"/>
  <circle cx="894" cy="130" r="4" fill="#33724d"/>
  <text x="650" y="142" font-size="10.5" fill="#33724d">awaiting your review</text>

  <rect x="650" y="152" width="3" height="18" rx="1.5" fill="#d9b458"/>
  <text x="661" y="166" font-family='Charter, Georgia, serif' font-size="12" font-style="italic" fill="#837d72">leave comments in the margin</text>

  <text x="650" y="194" font-size="10" font-weight="700" fill="#b03d22">you</text>
  <rect x="650" y="200" width="2" height="34" rx="1" fill="#b03d22" opacity="0.45"/>
  <g font-size="12.5" fill="#37342e">
    <text x="660" y="212">Can we point readers at the</text>
    <text x="660" y="228">sample docs here?</text>
  </g>

  <text x="650" y="252" font-size="10" font-weight="700" fill="#33724d">agent</text>
  <rect x="650" y="258" width="2" height="34" rx="1" fill="#33724d" opacity="0.45"/>
  <g font-size="12.5" fill="#37342e">
    <text x="660" y="270">Added a pointer to sample-docs/</text>
    <text x="660" y="286">with a try-it command.</text>
  </g>

  <rect x="650" y="302" width="64" height="24" rx="12" fill="none" stroke="#33724d"/>
  <text x="682" y="318" font-size="12" fill="#33724d" text-anchor="middle">accept</text>
  <rect x="722" y="302" width="56" height="24" rx="12" fill="none" stroke="#e2ded6"/>
  <text x="750" y="318" font-size="12" fill="#837d72" text-anchor="middle">reply</text>

  <!-- resolved card, dimmed -->
  <g opacity="0.55">
    <rect x="636" y="356" width="268" height="64" rx="10" fill="#fffefb" stroke="#e2ded6"/>
    <text x="650" y="378" font-size="10.5" fill="#33724d">✓ resolved</text>
    <rect x="650" y="388" width="3" height="16" rx="1.5" fill="#d9b458"/>
    <rect x="661" y="392" width="180" height="8" rx="4" fill="#e2ded6"/>
  </g>
</svg>
