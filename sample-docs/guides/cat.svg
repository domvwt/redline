      <ellipse cx="172" cy="102" rx="7" ry="10"/>
    </g>
    <circle cx="130.5" cy="98" r="2.5" fill="#fff"/>
    <circle cx="174.5" cy="98" r="2.5" fill="#fff"/>

    <!-- nose + mouth -->
    <path d="M144 122 h12 l-6 8 Z" fill="#b03d22"/>
    <path d="M150 130 v8 M150 138 q-8 10 -18 4 M150 138 q8 10 18 4" stroke="#8a5a33" stroke-width="3.5" stroke-linecap="round" fill="none"/>

    <!-- whiskers -->
