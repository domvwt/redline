  <!-- body -->
  <ellipse cx="168" cy="196" rx="78" ry="46" fill="#c98a4b"/>
  <ellipse cx="168" cy="206" rx="50" ry="30" fill="#e8c193"/>

  <!-- front paws -->
  <ellipse cx="140" cy="236" rx="16" ry="9" fill="#e8c193"/>
  <ellipse cx="186" cy="236" rx="16" ry="9" fill="#e8c193"/>

  <!-- head -->
  <g>
    <!-- ears -->
    <path d="M96 84 L108 34 L140 66 Z" fill="#c98a4b"/>
    <path d="M204 84 L192 34 L160 66 Z" fill="#c98a4b"/>
    <path d="M104 76 L111 48 L129 66 Z" fill="#e8a0a8"/>
    <path d="M196 76 L189 48 L171 66 Z" fill="#e8a0a8"/>
    <circle cx="150" cy="106" r="58" fill="#c98a4b"/>

